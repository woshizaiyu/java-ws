name: 构建 jar

on:
  workflow_dispatch:
    inputs:
      UUID:
        description: 'UUID（强烈建议填写自己的UUID）'
        required: false
        default: ''
        type: string

      KOMARI_SERVER:
        description: 'Komari 服务地址，例如：komari.example.com:25774'
        required: false
        default: ''
        type: string

      KOMARI_KEY:
        description: 'Komari Agent 密钥（在面板添加节点时获得）'
        required: false
        default: ''
        type: string

      DOMAIN:
        description: '反代的域名，不带前缀（如 example.com）'
        required: false
        default: ''
        type: string

      SUB_PATH:
        description: '订阅路径（默认 sub）'
        required: false
        default: 'sub'
        type: string

      NAME:
        description: '节点名称前缀（可选）'
        required: false
        default: ''
        type: string

      PORT:
        description: 'HTTP 和 WS 服务端口（默认 3000）'
        required: false
        default: '3000'
        type: string

jobs:
  build-plugin-jar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 获取提交哈希
        id: commit
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: 安装 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # ========== 替换源码中的默认值 ==========
      - name: 替换 App.java 中的默认值
        run: |
          FILE="src/main/java/App.java"
          
          if [ -n "${{ inputs.UUID }}" ]; then
            sed -i 's|getEnvValue(envFromFile, "UUID", "[^"]*")|getEnvValue(envFromFile, "UUID", "${{ inputs.UUID }}")|g' "$FILE"
          fi
          
          if [ -n "${{ inputs.KOMARI_SERVER }}" ]; then
            sed -i 's|getEnvValue(envFromFile, "KOMARI_SERVER", "[^"]*")|getEnvValue(envFromFile, "KOMARI_SERVER", "${{ inputs.KOMARI_SERVER }}")|g' "$FILE"
          fi
          
          if [ -n "${{ inputs.KOMARI_KEY }}" ]; then
            sed -i 's|getEnvValue(envFromFile, "KOMARI_KEY", "[^"]*")|getEnvValue(envFromFile, "KOMARI_KEY", "${{ inputs.KOMARI_KEY }}")|g' "$FILE"
          fi
          
          if [ -n "${{ inputs.DOMAIN }}" ]; then
            sed -i 's|getEnvValue(envFromFile, "DOMAIN", "[^"]*")|getEnvValue(envFromFile, "DOMAIN", "${{ inputs.DOMAIN }}")|g' "$FILE"
          fi
          
          if [ -n "${{ inputs.SUB_PATH }}" ]; then
            sed -i 's|getEnvValue(envFromFile, "SUB_PATH", "[^"]*")|getEnvValue(envFromFile, "SUB_PATH", "${{ inputs.SUB_PATH }}")|g' "$FILE"
          fi
          
          if [ -n "${{ inputs.NAME }}" ]; then
            sed -i 's|getEnvValue(envFromFile, "NAME", "[^"]*")|getEnvValue(envFromFile, "NAME", "${{ inputs.NAME }}")|g' "$FILE"
          fi
          
          if [ -n "${{ inputs.PORT }}" ]; then
            sed -i 's|getEnvValue(envFromFile, "PORT", "[^"]*")|getEnvValue(envFromFile, "PORT", "${{ inputs.PORT }}")|g' "$FILE"
          fi
          
          echo "========== 已替换的配置 =========="
          grep 'getEnvValue' "$FILE" | head -20
          echo "=================================="

      - name: 使用 Maven 打包
        run: mvn clean package

      - name: 获取 JAR 文件名
        id: jar-name
        run: |
          JAR_FILE=$(find target -name "server.jar" -type f | head -1)
          echo "jar_file=$JAR_FILE" >> $GITHUB_OUTPUT
          echo "找到 JAR 文件：$JAR_FILE"

      - name: 创建最新发布版本
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "java-uuid:${{ inputs.UUID }}"
          body: |
            ## 说明
            Java serverless 构建 vless/trojan/shadowsocks + Komari 探针，无需核心。
            下载下面的 JAR 文件并上传到服务器的根目录即可运行。
            
            **Komari 配置方式**：
            - KOMARI_SERVER：Komari 面板地址（例如 komari.example.com:25774）
            - KOMARI_KEY：Komari Agent 密钥
          files: ${{ steps.jar-name.outputs.jar_file }}
          make_latest: true
          overwrite: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: javaws-latest-build
          path: ${{ steps.jar-name.outputs.jar_file }}
          retention-days: 30

      - name: 清理历史运行记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 1
